services:
  ledger:
    image: "${LEDGER_IMAGE:-ghcr.io/tyemirov/ledger:latest}"
    container_name: hecate-ledger
    pull_policy: always
    environment:
      DATABASE_URL: "sqlite:///srv/data/ledger.db"
      GRPC_LISTEN_ADDR: ":50051"
      DEFAULT_TENANT_SECRET: "hecate-default-secret"
    ports:
      - "${LEDGER_HOST_PORT:-50051}:50051"
    volumes:
      - hecate_ledger_data:/srv/data
      - ${LEDGER_CONFIG_SOURCE:-./.runtime/ledger.config.yml}:/srv/config.yml:ro
    restart: unless-stopped

  tauth:
    image: ghcr.io/tyemirov/tauth:latest
    container_name: hecate-tauth
    pull_policy: always
    env_file:
      - ${TAUTH_ENV_FILE:-./configs/.env.tauth.local}
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${SITE_ORIGIN:-http://localhost:8000}
    volumes:
      - hecate_tauth_data:/data
      - ${TAUTH_CONFIG_SOURCE:-./tauth.config.local.yaml}:/config.yaml:ro
    ports:
      - "${TAUTH_HOST_PORT:-8081}:8080"
    restart: unless-stopped

  hecate-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hecate-api:local
    container_name: hecate-api
    env_file:
      - ${HECATEAPI_ENV_FILE:-./configs/.env.hecateapi.local}
      - ${TAUTH_ENV_FILE:-./configs/.env.tauth.local}
    environment:
      HECATEAPI_ALLOWED_ORIGINS: ${SITE_ORIGIN:-http://localhost:8000}
      HECATEAPI_DATABASE_DSN: "/data/hecate.db"
      HECATEAPI_LEDGER_SECRET_KEY: "hecate-default-secret"
    depends_on:
      - ledger
      - tauth
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/healthz >/dev/null || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    ports:
      - "${HECATE_API_HOST_PORT:-9090}:9090"
    volumes:
      - hecate_puzzle_data:/data
      - ${APP_CONFIG_SOURCE:-./.runtime/config.yml}:/configs/config.yml:ro
    restart: unless-stopped

  ghttp:
    image: ghcr.io/tyemirov/ghttp:latest
    container_name: hecate-ghttp
    pull_policy: always
    command:
      [
        "--directory",
        "/data",
        "--proxy",
        "/api=http://hecate-api:9090",
        "--proxy",
        "/auth=http://tauth:8080",
        "--proxy",
        "/me=http://tauth:8080",
        "--proxy",
        "/tauth.js=http://tauth:8080",
        "--response-header",
        "/js/=Cache-Control:public,max-age=86400",
        "--response-header",
        "/css/=Cache-Control:public,max-age=86400",
        "8000",
      ]
    ports:
      - "${HECATE_PORT:-8000}:8000"
    volumes:
      - .:/data:ro
      - ${PUBLIC_CONFIGS_SOURCE:-./.runtime/public-configs}:/data/configs:ro
    depends_on:
      hecate-api:
        condition: service_healthy
      tauth:
        condition: service_started
    restart: unless-stopped

volumes:
  hecate_tauth_data:
  hecate_ledger_data:
  hecate_puzzle_data:
